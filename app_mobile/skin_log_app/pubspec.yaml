name: skinlog
description: SkinLog — registro e análise de pele.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.1
  http_parser: ^4.0.0

  # Câmera ao vivo (preview com guia oval)
  camera: ^0.11.0

  # Galeria
  image_picker: ^1.1.2

  # Tipografia
  google_fonts: ^6.2.1

  # Persistência local (tokens)
  shared_preferences: ^2.3.1

  # Notificações locais
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.0
  flutter_timezone: ^1.0.7

  # Compartilhamento nativo
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true